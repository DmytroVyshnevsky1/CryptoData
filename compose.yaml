services:
  app:
    build:
      dockerfile: dockerfile
    container_name: symfony_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      SYMFONY_ENV: dev
    depends_on:
      - redis

  web:
    image: nginx:stable
    container_name: symfony_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  redis:
    image: redis:7
    container_name: symfony_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  react_client:
    build:
      context: https://github.com/TRPZtest/crypto-client.git
    ports:
      - "3000:3000"
    environment:
      - VITE_COIN_API_URL=http://symfony_web:80

volumes:
  redis_data:
